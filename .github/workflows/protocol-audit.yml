name: Protocol Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Run Command Validation
      run: python scripts/validate_commands.py

    - name: Run Vector State Linter
      run: python scripts/vector_lint.py
