[[rule]]
toolName = [
  "write_file",
  "read_file",
  "replace",
  "list_directory",
  "grep_search",
  "glob",
  "read_many_files",
  "get_internal_docs",
  "ask_user",
  "write_todos",
  "enter_plan_mode",
  "exit_plan_mode",
  "google_web_search",
  "activate_skill",
  "tracker_add_dependency",
  "tracker_create_task",
  "tracker_get_task",
  "tracker_list_tasks",
  "tracker_update_task",
  "tracker_visualize",
  "update_topic",
  "complete_task",
  "cli_help",
  "codebase_investigator"
]
decision = "allow"
priority = 500

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "pnpm",
  "uv",
  "python",
  "node",
  "npm",
  "git",
  "mkdir",
  "mv",
  "ls",
  "cp",
  "grep",
  "find",
  "cat",
  "echo",
  "touch"
]
decision = "allow"
priority = 300

[[rule]]
toolName = "run_shell_command"
decision = "ask_user"
priority = 100
